<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recruiting Dashboard — Punch Agency</title>
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2536;--bg4:#252d3f;--border:#2a3350;--accent:#4f8ef7;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--orange:#f97316;--purple:#7c3aed;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--empty:#232a3a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
header h1{font-size:16px;font-weight:700;}
.live-badge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 49px);}
/* sidebar */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 49px);position:sticky;top:49px;}
.sb-sec{padding:10px 14px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.vac-item{padding:7px 14px;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.vac-item:hover{background:var(--bg3);}
.vac-item.active{border-left-color:var(--accent);background:rgba(79,142,247,.09);}
.vac-name{font-size:11px;color:var(--text);line-height:1.3;flex:1;min-width:0;}
.vac-cnt{font-size:10px;font-weight:600;color:var(--text3);background:var(--bg3);border-radius:10px;padding:1px 6px;flex-shrink:0;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-opened{background:var(--green);}
.s-closed{background:var(--text3);}
.s-archived{background:var(--red);}
/* main */
main{padding:18px 20px;overflow-y:auto;}
/* period filter */
.period-bar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.period-bar label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.period-btn{padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:.15s;}
.period-btn:hover{color:var(--text);border-color:var(--accent);}
.period-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.period-sep{color:var(--border);}
input[type=date]{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;}
input[type=date]:focus{outline:none;border-color:var(--accent);}
#periodLabel{font-size:11px;color:var(--accent);font-weight:600;margin-left:4px;}
/* summary */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px;}
.scard-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.scard-val{font-size:26px;font-weight:700;}
.scard-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.c-blue .scard-val{color:var(--accent);}
.c-green .scard-val{color:var(--green);}
.c-red .scard-val{color:var(--red);}
/* tabs */
.tabs{display:flex;gap:3px;margin-bottom:18px;background:var(--bg2);border-radius:8px;padding:4px;border:1px solid var(--border);width:fit-content;}
.tab{padding:5px 14px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--text2);transition:.15s;}
.tab.active{background:var(--accent);color:#fff;font-weight:600;}
.tab:hover:not(.active){color:var(--text);background:var(--bg3);}
.panel{display:none;}
.panel.active{display:block;}
/* overview table */
.tbl-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.sort-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.sort-btn.active{border-color:var(--accent);color:var(--accent);}
.filter-btns{display:flex;gap:4px;}
.filter-btn{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:.15s;}
.filter-btn.active{background:rgba(79,142,247,.15);border-color:var(--accent);color:var(--accent);}
.ot{width:100%;border-collapse:collapse;}
.ot th{padding:8px 10px;text-align:left;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
.ot th:hover{color:var(--text);}
.ot th .arr{margin-left:4px;opacity:.5;}
.ot td{padding:7px 10px;border-bottom:1px solid rgba(42,51,80,.4);vertical-align:middle;}
.ot tr:hover td{background:var(--bg3);cursor:pointer;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.p-g{background:rgba(34,197,94,.12);color:var(--green);}
.p-r{background:rgba(239,68,68,.12);color:var(--red);}
.p-y{background:rgba(245,158,11,.12);color:var(--yellow);}
.p-b{background:rgba(79,142,247,.12);color:var(--accent);}
.p-gr{background:rgba(100,116,139,.12);color:var(--text3);}
.hbar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;width:70px;}
.hfill{height:100%;border-radius:3px;}
/* funnel */
.fun-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.fun-title{font-size:18px;font-weight:700;}
.fun-meta{font-size:11px;color:var(--text2);margin-top:3px;}
.dep-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(79,142,247,.12);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.fun-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.fs-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.fs-val{font-size:20px;font-weight:700;}
.fs-lbl{font-size:10px;color:var(--text2);margin-top:2px;}
.alert-box{border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;font-size:12px;}
.alert-warn{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);}
.alert-info{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);}
.stage-list{display:flex;flex-direction:column;gap:4px;}
.stage-row{display:grid;grid-template-columns:200px 1fr 50px;align-items:center;gap:10px;}
.s-label{font-size:11px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-label.empty{color:var(--text3);}
.bar-wrap{height:26px;background:var(--bg3);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:600;color:#fff;transition:width .35s;}
.bar-empty{height:100%;background:var(--empty);border-radius:5px;display:flex;align-items:center;padding-left:7px;}
.s-cnt{font-size:12px;font-weight:700;text-align:right;}
.s-cnt.empty{color:var(--text3);}
/* sources */
.src-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.src-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;}
.src-card h3{font-size:13px;font-weight:600;margin-bottom:14px;}
.src-row{display:grid;grid-template-columns:150px 1fr 55px;align-items:center;gap:8px;margin-bottom:7px;}
.src-lbl{font-size:11px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.src-bw{height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.src-bf{height:100%;border-radius:4px;transition:width .35s;}
.src-cnt{font-size:11px;font-weight:600;text-align:right;}
/* bottlenecks */
.bn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.bn-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px;cursor:pointer;transition:border-color .15s;}
.bn-card:hover{border-color:var(--accent);}
.bn-title{font-size:12px;font-weight:600;margin-bottom:5px;line-height:1.4;}
.bn-dept{font-size:10px;color:var(--text3);margin-bottom:10px;}
.bn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.bn-stat{text-align:center;}
.bn-stat-v{font-size:15px;font-weight:700;}
.bn-stat-l{font-size:9px;color:var(--text3);}
.bn-note{font-size:10px;border-radius:5px;padding:6px 8px;margin-top:5px;line-height:1.5;}
.bn-red{background:rgba(239,68,68,.08);color:var(--text2);}
.bn-yel{background:rgba(245,158,11,.08);color:var(--text2);}
h2{font-size:15px;font-weight:700;margin-bottom:14px;}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:14px">
    <div>
      <h1>🎯 Recruiting Dashboard · Punch Agency</h1>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <span style="font-size:11px;color:var(--text2)">22.06.2026</span>
    <div class="live-badge"><div class="dot"></div>PeopleForce Live</div>
  </div>
</header>

<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main>
  <!-- Period filter -->
  <div class="period-bar">
    <label>Період:</label>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="period-btn" onclick="setPeriod(1)">Тиждень</button>
      <button class="period-btn" onclick="setPeriod(2)">2 тижні</button>
      <button class="period-btn active" onclick="setPeriod(4)">Місяць</button>
      <button class="period-btn" onclick="setPeriod(12)">3 міс</button>
      <button class="period-btn" onclick="setPeriod(26)">6 міс</button>
      <button class="period-btn" onclick="setPeriod(9999)">Всі часи</button>
    </div>
    <div class="period-sep">|</div>
    <label>Вручну:</label>
    <input type="date" id="dateFrom" onchange="setCustomPeriod()">
    <span style="color:var(--text3)">—</span>
    <input type="date" id="dateTo" onchange="setCustomPeriod()">
    <span id="periodLabel"></span>
  </div>

  <!-- Summary cards -->
  <div class="sum-grid" id="sumGrid"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('overview')">Всі вакансії</div>
    <div class="tab" onclick="showTab('funnel')">Воронка</div>
    <div class="tab" onclick="showTab('sources')">Джерела</div>
    <div class="tab" onclick="showTab('bottlenecks')">Вузькі місця</div>
  </div>

  <div class="panel active" id="tab-overview"></div>
  <div class="panel" id="tab-funnel"></div>
  <div class="panel" id="tab-sources"></div>
  <div class="panel" id="tab-bottlenecks"></div>
</main>
</div>

<script>__RECRUITING_DATA__

// ---- HELPERS ----
const isReject = s => /reject|відмов|refus|polygraph\s*reject|offer\s*reject|disqualif/i.test(s);
const isHired  = s => /^hired$|offer accepted|made offer/i.test(s);
const isActive = s => !isReject(s) && !isHired(s);

const SRC_COLORS = {
  'Telegram':'#229ED9','Work.ua':'#0077b5','Djinni Researcher':'#7c3aed',
  'linkedin Researcher':'#0a66c2','Telegram Viktoriia':'#25D366',
  'Recommendation by employee':'#f59e0b','Telegram Researcher':'#22c55e',
  'Rabota.ua':'#ef4444','Djinni':'#8b5cf6','Linkedin':'#0a66c2',
  'Unknown':'#475569',''  :'#475569'
};
const srcColor = s => SRC_COLORS[s] || '#4f8ef7';

const STAGE_COLORS = ['#4f8ef7','#7c3aed','#06b6d4','#10b981','#f59e0b','#f97316','#ec4899'];
const stageColor = (i) => STAGE_COLORS[i % STAGE_COLORS.length];

// ---- STATE ----
let periodWeeks = 4;
let dateFrom = null;
let dateTo   = null;
let currentVacId = (VACS.find(v=>v.state==='opened')||VACS[0]).id;
let sortCol  = 'total';
let sortDir  = -1;
let stateFilter = 'all';
let currentTab = 'overview';

// ---- PERIOD ----
function periodDates() {
  if (dateFrom && dateTo) return {from: dateFrom, to: dateTo};
  if (periodWeeks >= 9999) return {from:'2000-01-01', to:'2999-12-31'};
  const to = new Date();
  const from = new Date(); from.setDate(from.getDate() - periodWeeks * 7);
  return {from: from.toISOString().slice(0,10), to: to.toISOString().slice(0,10)};
}

function setPeriod(w) {
  periodWeeks = w; dateFrom = null; dateTo = null;
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.querySelectorAll('.period-btn').forEach((b,i)=>{
    const weeks=[1,2,4,12,26,9999];
    b.classList.toggle('active', weeks[i]===w);
  });
  const {from,to} = periodDates();
  document.getElementById('periodLabel').textContent = w>=9999 ? 'Всі дані' : `${from} → ${to}`;
  refreshAll();
}

function setCustomPeriod() {
  dateFrom = document.getElementById('dateFrom').value;
  dateTo   = document.getElementById('dateTo').value;
  if (!dateFrom || !dateTo) return;
  periodWeeks = 0;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('periodLabel').textContent = `${dateFrom} → ${dateTo}`;
  refreshAll();
}

function filteredApps(vacId) {
  const {from, to} = periodDates();
  return APPS.filter(a => {
    if (vacId !== undefined && a.vid !== vacId) return false;
    return a.ca >= from && a.ca <= to;
  });
}

// ---- SUMMARY ----
function buildSummary() {
  const {from,to} = periodDates();
  const apps = APPS.filter(a => a.ca >= from && a.ca <= to);
  const total  = apps.length;
  const hired  = apps.filter(a=>isHired(a.sn)).length;
  const rejected = apps.filter(a=>isReject(a.sn)).length;
  const openVacs = VACS.filter(v=>v.state==='opened').length;
  document.getElementById('sumGrid').innerHTML = `
    <div class="scard c-blue"><div class="scard-lbl">Вакансій відкрито</div><div class="scard-val">${openVacs}</div><div class="scard-sub">із ${VACS.length} всього</div></div>
    <div class="scard"><div class="scard-lbl">Аплікацій за період</div><div class="scard-val">${total}</div><div class="scard-sub">з ${APPS.length} загалом</div></div>
    <div class="scard c-green"><div class="scard-lbl">Найнято / Offer</div><div class="scard-val">${hired}</div><div class="scard-sub">${total>0?((hired/total)*100).toFixed(1):0}% conversion</div></div>
    <div class="scard c-red"><div class="scard-lbl">Rejected</div><div class="scard-val">${rejected}</div><div class="scard-sub">${total>0?((rejected/total)*100).toFixed(1):0}% reject rate</div></div>`;
}

// ---- SIDEBAR ----
function buildSidebar() {
  const opened = VACS.filter(v=>v.state==='opened');
  const closed = VACS.filter(v=>v.state!=='opened');
  const item = v => `<div class="vac-item ${v.id===currentVacId?'active':''}" onclick="selectVac(${v.id})">
    <div class="sdot s-${v.state}"></div>
    <div class="vac-name">${v.title}</div>
    <div class="vac-cnt">${v.appCount||0}</div>
  </div>`;
  document.getElementById('sidebar').innerHTML =
    `<div class="sb-sec">Відкриті (${opened.length})</div>${opened.map(item).join('')}
     <div class="sb-sec" style="margin-top:6px">Закриті / Archived (${closed.length})</div>${closed.map(item).join('')}`;
}

// ---- OVERVIEW ----
let ovRows = [];
function buildOverview() {
  const {from,to} = periodDates();
  ovRows = VACS.map(v => {
    const va = APPS.filter(a=>a.vid===v.id && a.ca>=from && a.ca<=to);
    const total    = va.length;
    const hired    = va.filter(a=>isHired(a.sn)).length;
    const rejected = va.filter(a=>isReject(a.sn)).length;
    const active   = total - hired - rejected;
    const convRate = total>0 ? (hired/total*100).toFixed(1) : 0;
    const rejRate  = total>0 ? (rejected/total*100).toFixed(1) : 0;
    return {v, total, hired, rejected, active, convRate:+convRate, rejRate:+rejRate};
  });
  renderTable();
}

function renderTable() {
  let rows = ovRows.filter(r => stateFilter==='all' || r.v.state===stateFilter);
  rows.sort((a,b) => {
    let av=a[sortCol], bv=b[sortCol];
    if (sortCol==='title') { av=a.v.title; bv=b.v.title; return sortDir*(av>bv?1:av<bv?-1:0); }
    if (sortCol==='state') { av=a.v.state; bv=b.v.state; return sortDir*(av>bv?1:av<bv?-1:0); }
    if (sortCol==='dept')  { av=a.v.dept||''; bv=b.v.dept||''; return sortDir*(av>bv?1:av<bv?-1:0); }
    return sortDir*(bv-av);
  });
  const cols = [
    {k:'title',  lbl:'Вакансія'},
    {k:'state',  lbl:'Статус'},
    {k:'dept',   lbl:'Відділ'},
    {k:'total',  lbl:'Аплікацій'},
    {k:'hired',  lbl:'Найнято'},
    {k:'rejected',lbl:'Rejected'},
    {k:'active', lbl:'Активних'},
    {k:'convRate',lbl:'Conversion'},
    {k:'rejRate', lbl:'Reject %'},
  ];
  const thArr = (k) => sortCol===k ? (sortDir>0?'↑':'↓') : '⇅';
  const ths = cols.map(c=>`<th onclick="sortBy('${c.k}')">${c.lbl} <span class="arr">${thArr(c.k)}</span></th>`).join('');
  const trs = rows.map(({v,total,hired,rejected,active,convRate,rejRate})=>{
    const stBadge = {opened:`<span class="pill p-g">Відкрита</span>`,closed:`<span class="pill p-gr">Закрита</span>`,archived:`<span class="pill p-r">Archived</span>`}[v.state]||'';
    return `<tr onclick="selectVac(${v.id});showTab('funnel')">
      <td><div style="font-size:12px;font-weight:600">${v.title}</div></td>
      <td>${stBadge}</td>
      <td style="font-size:11px;color:var(--text3)">${v.dept||''}</td>
      <td style="font-weight:700">${total}</td>
      <td style="color:var(--green);font-weight:600">${hired}</td>
      <td style="color:var(--red);font-weight:600">${rejected}</td>
      <td style="color:var(--accent);font-weight:600">${active}</td>
      <td>${convRate}%<div class="hbar"><div class="hfill" style="width:${Math.min(100,convRate*3)}%;background:var(--green)"></div></div></td>
      <td>${rejRate}%<div class="hbar"><div class="hfill" style="width:${Math.min(100,rejRate)}%;background:var(--red)"></div></div></td>
    </tr>`;
  }).join('');

  document.getElementById('tab-overview').innerHTML = `
    <h2>Всі вакансії</h2>
    <div class="tbl-toolbar">
      <div class="filter-btns">
        <button class="filter-btn ${stateFilter==='all'?'active':''}" onclick="filterState('all')">Всі</button>
        <button class="filter-btn ${stateFilter==='opened'?'active':''}" onclick="filterState('opened')">Відкриті</button>
        <button class="filter-btn ${stateFilter==='closed'?'active':''}" onclick="filterState('closed')">Закриті</button>
        <button class="filter-btn ${stateFilter==='archived'?'active':''}" onclick="filterState('archived')">Archived</button>
      </div>
      <span style="font-size:11px;color:var(--text3)">Клік по рядку → воронка · Клік по заголовку → сортування</span>
    </div>
    <div style="overflow-x:auto"><table class="ot"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else {sortCol=col; sortDir=-1;}
  renderTable();
}
function filterState(s) { stateFilter=s; renderTable(); }

// ---- FUNNEL ----
function buildFunnel(vacId) {
  const vac = VACS.find(v=>v.id===vacId);
  if (!vac) return;
  const apps = filteredApps(vacId);
  const stageCounts = {};
  apps.forEach(a=>{ stageCounts[a.sn] = (stageCounts[a.sn]||0)+1; });
  const total    = apps.length;
  const hired    = apps.filter(a=>isHired(a.sn)).length;
  const rejected = apps.filter(a=>isReject(a.sn)).length;
  const conv     = total>0 ? ((hired/total)*100).toFixed(1) : 0;

  // All defined stages for this pipeline + any extra from data
  const defStages = (vac.stages||[]).slice().sort((a,b)=>a.pos-b.pos);
  const defNames  = new Set(defStages.map(s=>s.name));
  const extraNames = Object.keys(stageCounts).filter(n=>!defNames.has(n));
  const allStages = [
    ...defStages.map(s=>({name:s.name, defined:true})),
    ...extraNames.map(n=>({name:n, defined:false}))
  ];

  const maxCount = Math.max(...Object.values(stageCounts).concat([1]));
  let colorIdx = 0;

  const rows = allStages.map(({name, defined})=>{
    const cnt = stageCounts[name]||0;
    const isEmpty = cnt===0;
    const pct = isEmpty ? 100 : (cnt/maxCount)*100;
    let color = isReject(name)?'var(--red)':isHired(name)?'var(--green)':stageColor(colorIdx++);
    const ofTotal = total>0 ? `${((cnt/total)*100).toFixed(0)}%` : '';
    if (isEmpty) {
      return `<div class="stage-row">
        <div class="s-label empty">${name}</div>
        <div class="bar-wrap"><div class="bar-empty"><span style="font-size:10px;color:var(--text3)">0</span></div></div>
        <div class="s-cnt empty">0</div>
      </div>`;
    }
    return `<div class="stage-row">
      <div class="s-label">${name}</div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pct}%;background:${color}">
          ${pct>18?ofTotal:''}
        </div>
      </div>
      <div class="s-cnt">${cnt}</div>
    </div>`;
  }).join('');

  const biggestRej = Object.entries(stageCounts).filter(([k])=>isReject(k)).sort((a,b)=>b[1]-a[1])[0];
  const stagnant = (stageCounts['Новий кандидат']||stageCounts['Новый кандидат']||stageCounts['New candidate']||0);
  const alerts = [
    biggestRej && biggestRej[1]>=3 ? `<div class="alert-box alert-warn">
      <span>🔴</span>
      <div><strong style="color:var(--red)">Вузьке місце:</strong> "${biggestRej[0]}" — <strong>${biggestRej[1]}</strong> кандидатів (${total>0?((biggestRej[1]/total)*100).toFixed(0):0}%). Розгляньте причини відсіву на цьому кроці.</div>
    </div>`:null,
    stagnant>=5 ? `<div class="alert-box alert-info">
      <span>⚠️</span>
      <div><strong style="color:var(--yellow)">Стагнація:</strong> <strong>${stagnant}</strong> кандидатів застрягли на початковому етапі — потрібно відпрацювати або відхилити.</div>
    </div>`:null,
  ].filter(Boolean).join('');

  document.getElementById('tab-funnel').innerHTML = `
    <div class="fun-header">
      <div>
        <div class="fun-title">${vac.title}</div>
        <div class="fun-meta">
          <span class="dep-badge">${vac.dept||'N/A'}</span>
          &nbsp;
          <span style="color:var(--text3);font-size:11px">Статус: <span style="color:${vac.state==='opened'?'var(--green)':'var(--text3)'}">${vac.state}</span></span>
          &nbsp;·&nbsp;
          <span style="color:var(--text3);font-size:11px">Pipeline: ${vac.pipeName||'—'}</span>
        </div>
      </div>
    </div>
    <div class="fun-stats">
      <div class="fs-card"><div class="fs-val" style="color:var(--accent)">${total}</div><div class="fs-lbl">Аплікацій за період</div></div>
      <div class="fs-card"><div class="fs-val" style="color:var(--green)">${hired} <span style="font-size:12px">(${conv}%)</span></div><div class="fs-lbl">Hired / Offer accepted</div></div>
      <div class="fs-card"><div class="fs-val" style="color:var(--red)">${rejected}</div><div class="fs-lbl">Rejected</div></div>
    </div>
    ${alerts}
    <div class="stage-list">${rows}</div>
    ${defStages.length>0?`<div style="font-size:10px;color:var(--text3);margin-top:12px">Темно-сірі рядки = етапи pipeline без кандидатів за обраний період</div>`:''}`;
}

// ---- SOURCES ----
function buildSources() {
  const apps = filteredApps();
  const srcMap = {};
  apps.forEach(a=>{
    const s = a.src||'Unknown';
    srcMap[s] = (srcMap[s]||0)+1;
  });
  const sorted = Object.entries(srcMap).sort((a,b)=>b[1]-a[1]);
  const total = sorted.reduce((s,[,n])=>s+n,0);
  const maxN  = sorted[0]?.[1]||1;
  const bars = sorted.map(([name,cnt])=>`
    <div class="src-row">
      <div class="src-lbl">${name||'Unknown'}</div>
      <div class="src-bw"><div class="src-bf" style="width:${(cnt/maxN)*100}%;background:${srcColor(name)}"></div></div>
      <div class="src-cnt">${cnt} <span style="color:var(--text3);font-size:9px">${total>0?((cnt/total)*100).toFixed(0):0}%</span></div>
    </div>`).join('');
  const top = sorted[0];
  const researchers = sorted.filter(([k])=>k.toLowerCase().includes('researcher')).reduce((s,[,n])=>s+n,0);
  const organic     = sorted.filter(([k])=>!k.toLowerCase().includes('researcher')&&k!=='Unknown'&&k!=='').reduce((s,[,n])=>s+n,0);

  document.getElementById('tab-sources').innerHTML = `
    <h2>Аналітика по джерелах</h2>
    <div class="src-grid">
      <div class="src-card"><h3>Кандидати по джерелах</h3>${bars||'<div style="color:var(--text3)">Немає даних за цей період</div>'}</div>
      <div class="src-card">
        <h3>Insights</h3>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${top?`<div style="background:var(--bg3);border-radius:7px;padding:12px">
            <div style="font-size:10px;color:var(--text3);margin-bottom:3px">ТОП джерело</div>
            <div style="font-size:18px;font-weight:700;color:${srcColor(top[0])}">${top[0]||'Unknown'}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:3px">${top[1]} кандидатів · ${total>0?((top[1]/total)*100).toFixed(0):0}%</div>
          </div>`:''}
          <div style="background:var(--bg3);border-radius:7px;padding:12px">
            <div style="font-size:10px;color:var(--text3);margin-bottom:8px">Тип джерела</div>
            <div style="display:flex;flex-direction:column;gap:5px;font-size:11px">
              <div style="display:flex;justify-content:space-between"><span>Вхідні (Telegram, Job boards)</span><strong>${organic}</strong></div>
              <div style="display:flex;justify-content:space-between"><span>Ресечер (активний аутрич)</span><strong>${researchers}</strong></div>
              <div style="display:flex;justify-content:space-between"><span>Невідомо</span><strong>${srcMap['Unknown']||srcMap['']||0}</strong></div>
            </div>
          </div>
          ${total===0?`<div class="alert-box alert-info"><span>ℹ️</span><div>Немає аплікацій за обраний період. Розширте діапазон дат.</div></div>`:''}
          ${top&&top[0]==='Telegram'&&total>0&&(top[1]/total)>0.5?`<div class="alert-box alert-info"><span>⚠️</span><div style="font-size:11px"><strong style="color:var(--yellow)">Рекомендація:</strong> Telegram домінує (${((top[1]/total)*100).toFixed(0)}%). Розгляньте збільшення частки Djinni та LinkedIn для технічних ролей.</div></div>`:''}
        </div>
      </div>
    </div>`;
}

// ---- BOTTLENECKS ----
function buildBottlenecks() {
  const {from,to} = periodDates();
  const items = VACS.filter(v=>v.state==='opened').map(v=>{
    const apps = APPS.filter(a=>a.vid===v.id && a.ca>=from && a.ca<=to);
    const total    = apps.length;
    const rejApps  = apps.filter(a=>isReject(a.sn));
    const hired    = apps.filter(a=>isHired(a.sn)).length;
    const rejected = rejApps.length;
    const stagnant = apps.filter(a=>/новий кандидат|новый кандидат|new candidate|sourced/i.test(a.sn)).length;
    const rejRate  = total>0 ? (rejected/total)*100 : 0;
    const bigRej   = Object.entries(rejApps.reduce((m,a)=>{m[a.sn]=(m[a.sn]||0)+1;return m;},{})).sort((a,b)=>b[1]-a[1])[0];
    return {v,total,rejected,hired,stagnant,rejRate,bigRej};
  }).sort((a,b)=>b.rejRate-a.rejRate);

  const cards = items.map(({v,total,rejected,hired,stagnant,rejRate,bigRej})=>{
    const sev = rejRate>60?'red':rejRate>30?'yellow':'green';
    return `<div class="bn-card" style="border-color:${sev==='red'?'rgba(239,68,68,.4)':sev==='yellow'?'rgba(245,158,11,.35)':'rgba(34,197,94,.3)'}" onclick="selectVac(${v.id});showTab('funnel')">
      <div class="bn-title">${{red:'🔴',yellow:'🟡',green:'🟢'}[sev]} ${v.title}</div>
      <div class="bn-dept">${v.dept}</div>
      <div class="bn-row">
        <div class="bn-stat"><div class="bn-stat-v" style="color:var(--accent)">${total}</div><div class="bn-stat-l">Всього</div></div>
        <div class="bn-stat"><div class="bn-stat-v" style="color:var(--red)">${rejected}</div><div class="bn-stat-l">Rejected</div></div>
        <div class="bn-stat"><div class="bn-stat-v" style="color:var(--green)">${hired}</div><div class="bn-stat-l">Hired</div></div>
      </div>
      ${bigRej?`<div class="bn-note bn-red">🔴 Вузьке місце: <strong>${bigRej[0]}</strong> — ${bigRej[1]} осіб</div>`:''}
      ${stagnant>=3?`<div class="bn-note bn-yel" style="margin-top:4px">⚠️ ${stagnant} кандидатів застрягли на початку</div>`:''}
      ${total===0?`<div class="bn-note" style="background:var(--bg3);color:var(--text3)">Немає аплікацій за цей період</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('tab-bottlenecks').innerHTML = `
    <h2>Вузькі місця — Відкриті вакансії</h2>
    <p style="font-size:11px;color:var(--text2);margin-bottom:14px">Дані фільтруються за обраним вище періодом. Клік → воронка вакансії.</p>
    <div class="bn-grid">${cards||'<div style="color:var(--text3)">Немає відкритих вакансій</div>'}</div>`;
}

// ---- NAVIGATION ----
function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  ['overview','funnel','sources','bottlenecks'].forEach((n,i)=>{
    if(n===name) document.querySelectorAll('.tab')[i].classList.add('active');
  });
  if (name==='funnel') buildFunnel(currentVacId);
}

function selectVac(id) {
  currentVacId = id;
  buildSidebar();
  if (currentTab==='funnel') buildFunnel(id);
}

function refreshAll() {
  buildSummary();
  buildSidebar();
  if (currentTab==='overview')     buildOverview();
  if (currentTab==='funnel')       buildFunnel(currentVacId);
  if (currentTab==='sources')      buildSources();
  if (currentTab==='bottlenecks')  buildBottlenecks();
  buildOverview(); // always keep data fresh
}

// ---- INIT ----
setPeriod(4);
buildOverview();
buildFunnel(currentVacId);
buildSources();
buildBottlenecks();
</script>
</body>
</html>
